<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connections</title>




<style>
#home {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color:white;
}

.title {
  text-align:center;
  color:white;
  margin-bottom:10px;
}

.top-bar {
  text-align:center;
  color:white;
  font-size:18px;
  margin-bottom:10px;
}

#home input {
  padding:10px;
  font-size:18px;
  margin:10px;
  border-radius:8px;
  border:none;
}

#home button {
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

body {
  font-family: Arial;
  margin:0;
  padding:0;

  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height:100vh;
}

#game-container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
  text-align: center;
}




.buttons {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.buttons button {
  width:100%;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
  transition:0.2s;
}

.buttons button:hover {
  transform:scale(1.03);
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 colonnes flexibles */
  gap: 8px;
  max-width: 500px;
  margin: 20px auto;
  padding: 0 10px;
}

.word {
  width: 100px;          /* largeur fixe */
  height: 60px;          /* hauteur fixe */
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 0.9rem;     /* texte proportionnel */
  padding: 5px;
  box-sizing: border-box;
  word-wrap: break-word;
  overflow: hidden;      /* pour ne pas dépasser */
}
  
button:active {
  transform:scale(0.97);
}

#grid {
  background: rgba(255,255,255,0.1);
  padding:10px;
  border-radius:15px;
}

/* Ajustement responsive */
@media (max-width: 500px) {
  .word {
    font-size: 0.8rem;   /* texte réduit sur mobile */
    height: 50px;        /* rectangle plus petit */
  }
}

/* Titre H2 (nom de la grille) */
#title {
  font-size: 1.5rem;
  margin-bottom:10px;
}

@media (max-width:500px) {
  #title {
    font-size:1.2rem;    /* réduit sur mobile */
  }
}

#timer, #lives {
  font-size: 1rem;       /* taille fixe pour tous les écrans */
}

@media (max-width: 500px) {
  #timer, #lives {
    font-size: 0.9rem;   /* légèrement plus petit sur mobile */
  }
}
  
.selected { background: lightblue; }
.correct { background: lightgreen; }

/* Taille fixe pour les blocs solutions (desktop) */
.found-cat {
  width: 400px;        /* largeur fixe sur ordinateur */
  height: 100px;       /* hauteur fixe sur ordinateur */
  overflow-y: auto;    /* scroll si beaucoup de mots */
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  box-sizing: border-box;
}

/* Taille fixe pour les blocs solutions (mobile) */
@media (max-width: 500px) {
  .found-cat {
    width: 90%;         /* presque toute la largeur de l'écran */
    height: 80px;       /* hauteur fixe adaptée au mobile */
    font-size: 0.8rem;  /* texte légèrement plus petit */
  }
}

  
.level1 { background:#f1c40f; color:black; }
.level2 { background:#2ecc71; }
.level3 { background:#3498db; }
.level4 { background:#9b59b6; }
.level5 { background:#e67e22; }                /* orange */


</style>
</head>

<body>

<!-- CONTENU VISIBLE DANS LE BODY -->
<div id="home">
  <h1 class="title">🧠 Le Jeu des Connexions</h1>

  <input id="playerName" placeholder="Entre ton pseudo..." />

  <button onclick="enterGame()">Jouer</button>
</div>

<div id="menu" style="display:none;"></div>

<div id="game" style="display:none;">
  <div id="game-container">
    <h1 class="title">🧠 Connections</h1>

    <div class="top-bar">
      ❤️ <span id="lives">4</span> |
      ⏱ <span id="timer">0</span>s
    </div>

    <h2 id="title"></h2>

    <div id="grid" class="grid"></div>

    <div class="buttons">
      <button onclick="check()">✔ Valider</button>
      <button onclick="backToMenu()">⬅ Menu</button>
      <button onclick="loadScores()">🏆 Classement</button>
      <button onclick="showSolutions()">🧩 Afficher les solutions</button>
    </div>

    <div id="found"></div>
    <p id="msg"></p>
    <div id="scores"></div>
  </div>
</div>

<script>

let errors = 0;
let startTime;
let timerInterval;

let gameCats = [];
let selected = [];
let lives = 4;

/* LOAD */
async function loadGame(){
  const res = await fetch("grid.json");
  const data = await res.json();

  gameCats = data.categories;
  start(data.name);
}

async function loadMenu() {
  const res = await fetch("grids.json");
  const data = await res.json();

  // Log pour vérifier que le fichier est bien chargé
  console.log("Grilles chargées:", data);

  const menu = document.getElementById("menu");
  menu.style.display = "block";

  let html = "<h2 style='text-align:center'>Choisis ta grille</h2>";

  data.grids.forEach(g => {
    html += `
      <div style="text-align:center; margin:10px;">
        <button onclick="loadGridFile('${g.file}')">
          🎮 ${g.name}
        </button>
      </div>
    `;
  });

  menu.innerHTML = html;
}

  
 function enterGame() {
  const name = document.getElementById("playerName").value;

  if (!name) {
    alert("Entre un pseudo !");
    return;
  }

  // ✅ on sauvegarde le pseudo globalement
  window.playerName = name;
  localStorage.setItem("playerName", name);

  // Log pour vérifier si le pseudo est bien enregistré
  console.log("Nom du joueur enregistré dans localStorage:", localStorage.getItem("playerName"));

  // Cache la page d'accueil
  document.getElementById("home").style.display = "none";

  // Charge le menu avec les grilles de jeu
  loadMenu();
}

async function loadGridFile(file){

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  const res = await fetch(file);
  const data = await res.json();

  gameCats = data.categories;

  start(data.name); // ⚠️ ton système actuel reste intact
}

function backToMenu(){

  document.getElementById("game").style.display = "none";
  document.getElementById("menu").style.display = "block";

  // reset visuel
  document.getElementById("grid").innerHTML = "";
  document.getElementById("found").innerHTML = "";
  document.getElementById("msg").textContent = "";
}

/* START */
function start(title){

  // ✅ reset propre des vies
  lives = 4;
  document.getElementById("lives").textContent = lives;

  document.getElementById("title").textContent = title;
  document.getElementById("found").innerHTML = "";

  let words = [];
  gameCats.forEach(c => words.push(...c.words));
  words.sort(() => Math.random() - 0.5);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  selected = [];
  document.getElementById("msg").textContent = "";

  words.forEach(w => {
    const b = document.createElement("button");
    b.className = "word";
    b.textContent = w;

    b.onclick = () => {

      if (b.classList.contains("correct")) return;

      if (selected.includes(w)) {
        selected = selected.filter(x => x !== w);
        b.classList.remove("selected");
      } else if (selected.length < 4) {
        selected.push(w);
        b.classList.add("selected");
      }
    };

    grid.appendChild(b);
  });

  errors = 0;
  startTime = Date.now();

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").textContent = elapsed;
  }, 1000);
}

/* CLEAR */
function clearSelection(){
  selected = [];
  document.querySelectorAll(".word").forEach(b => b.classList.remove("selected"));
}

function saveLives(){
  localStorage.setItem("connections_lives", lives);
}

  async function saveScore(won){

  const player = window.playerName || "Anonyme";
  const time = Math.floor((Date.now() - startTime) / 1000);

  await window.addDoc(
    window.collection(window.db, "scores"),
    {
      player: player,
      grid: document.getElementById("title").textContent,
      errors: errors,
      time: time,
      won: won,
      perfect: errors === 0,
      date: new Date().toISOString()
    }
  );
}
/* CHECK */
function check() {
  // Vérification si moins de 4 cases sont sélectionnées
  if (selected.length < 4) {
    document.getElementById("msg").textContent = "⚠️ Attention, il faut sélectionner 4 cases :)";
    clearSelection(); // Deselect everything
    return; // Si moins de 4 cases, on ne fait pas le reste
  }

  // Sauvegarde des vies dans localStorage
  saveLives();

  // On réinitialise foundCategory à false pour chaque tentative
  let foundCategory = false;

  const sel = selected.map(x => x.toLowerCase().trim());

  // Vérification de la sélection avec toutes les catégories
  for (let c of gameCats) {
    let cw = c.words.map(x => x.toLowerCase().trim());

    // Vérification si la sélection correspond à la catégorie
    let ok = sel.length === 4 && sel.every(w => cw.includes(w));

    if (ok) {
      foundCategory = true;  // Catégorie trouvée, ne pas compter comme erreur
      document.getElementById("msg").textContent = "✅ " + c.name;

      // Affichage de la catégorie trouvée avec couleur
      const div = document.createElement("div");
      div.className = "found-cat level" + c.level;

      div.innerHTML =
        "🧩 " + c.name +
        " (Niveau " + c.level + ")<br>" +
        c.words.join(", ");

      document.getElementById("found").appendChild(div);

      // Désactivation des mots trouvés
      document.querySelectorAll(".word").forEach(b => {
        if (sel.includes(b.textContent.toLowerCase().trim())) {
          b.classList.add("correct");
          b.disabled = true;
        }
      });

      // Vérification si toutes les catégories sont trouvées
      if (document.querySelectorAll(".correct").length === gameCats.length * 4) {
        clearInterval(timerInterval);
        saveScore(true);
        document.getElementById("msg").textContent = "🎉 Félicitations !!! 👏";      
      }

      clearSelection();
      return;
    }

    // Gestion de l'erreur "One Away"
    let overlap = sel.filter(w => cw.includes(w)).length;

    if (overlap === 3) {
      if (lives > 0) lives--;
      document.getElementById("lives").textContent = lives;
      document.getElementById("msg").textContent = "⚠️ One Away";

      clearSelection();

      if (lives === 0) end();
      
      // Sauvegarde des vies après chaque modification
      saveLives();
      return;
    }
  }

  // Si aucune catégorie trouvée (cela constitue une erreur)
  if (!foundCategory) {
    errors++; // N'augmenter les erreurs que si la sélection est incorrecte
    if (lives > 0) lives--; // Retrait d'une vie pour une erreur
    document.getElementById("lives").textContent = lives;
    document.getElementById("msg").textContent = "❌ Faux";
  }

  clearSelection();

  // Si le joueur n'a plus de vies, fin de la partie
  if (lives === 0) end();

  // Sauvegarde des vies après chaque modification
  saveLives();
}


/* SHOW SOLUTIONS */
function showSolutions() {
  let solutions = "<br><br>Solutions :<br>";
  
  gameCats.forEach(c => {
    solutions += "<b>" + c.name + "</b> : " + c.words.join(", ") + "<br>";
  });

  document.getElementById("msg").innerHTML += solutions;
}

  
/* END */
function end(){
  document.getElementById("msg").textContent = "💡 Tu peux continuer à chercher ou afficher la solution !";
  clearInterval(timerInterval);

  // On ne bloque PLUS le jeu
  lives = 0;
  document.getElementById("lives").textContent = 0;

  saveScore(false);
}


async function loadScores(){

  const currentGrid = document.getElementById("title").textContent;

  const q = window.query(
    window.collection(window.db, "scores"),
    window.orderBy("time", "asc"),
    window.limit(50)
  );

  const snap = await window.getDocs(q);

  let html = "<h3>🏆 Classement</h3>";

  snap.forEach(doc => {
    const d = doc.data();

    if (d.grid !== currentGrid) return; // filtre JS

    html += `
      <div>
        <b>${d.player}</b> |
        ${d.time}s |
        ${d.errors} erreurs
        ${d.perfect ? "🏅 PERFECT" : ""}
      </div>
    `;
  });

  document.getElementById("scores").innerHTML = html;
}

  


</script>

</body>
