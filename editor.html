<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connections</title>

<style>
body { font-family: Arial; padding:20px; }

button { margin:5px; padding:8px; cursor:pointer; }
input { width:300px; margin:5px 0; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,120px);
  gap:10px;
}

.word { height:60px; }

.selected { background: lightblue; }
.correct { background: lightgreen; }

.hidden { display:none; }

/* ⭐ AJOUT CATÉGORIES TROUVÉES */
.found-cat {
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  color:white;
  font-weight:bold;
}

.level1 { background:#f1c40f; color:black; }
.level2 { background:#2ecc71; }
.level3 { background:#3498db; }
.level4 { background:#9b59b6; }

</style>
</head>

<body>

<h1>🧠 Connections</h1>

<button onclick="showEditor()">Éditeur</button>
<button onclick="showList()">Mes grilles</button>
<button onclick="showGame()">Grille du jour</button>

<hr>

<!-- EDITOR -->
<div id="editor">

<h2>Créer une grille</h2>

<input id="name" placeholder="Nom"><br><br>

<div id="cats"></div>

<button onclick="addCat()">+ Catégorie</button>
<button onclick="save()">💾 Sauvegarder</button>
<button onclick="copyJSON()">📋 Copier JSON</button>

</div>

<!-- LIST -->
<div id="list" class="hidden">
<h2>Mes grilles</h2>
<div id="grids"></div>
</div>

<!-- GAME -->
<div id="game" class="hidden">

<h2 id="title"></h2>

<div>❤️ Vies: <span id="lives">4</span></div>

<!-- ⭐ AJOUT AFFICHAGE CATÉGORIES TROUVÉES -->
<div id="found"></div>

<div id="grid" class="grid"></div>

<p id="msg"></p>

<button onclick="check()">Valider</button>

</div>

<script>

let grids = JSON.parse(localStorage.getItem("grids") || "[]");

let gameCats = [];
let selected = [];
let lives = 4;

/* NAV */
function hideAll(){
  document.getElementById("editor").style.display="none";
  document.getElementById("list").style.display="none";
  document.getElementById("game").style.display="none";
}

function showEditor(){
  hideAll();
  document.getElementById("editor").style.display="block";
}

function showList(){
  hideAll();
  document.getElementById("list").style.display="block";
  render();
}

function showGame(){
  hideAll();
  document.getElementById("game").style.display="block";
  loadGame();
}

/* ADD CATEGORY */
function addCat(){

  const div = document.createElement("div");

  const i1 = document.createElement("input");
  i1.placeholder="nom";

  const i2 = document.createElement("input");
  i2.placeholder="niveau 1-4";

  const i3 = document.createElement("input");
  i3.placeholder="mot1, mot2, mot3, mot4";

  // 🗑 bouton suppression
  const del = document.createElement("button");
  del.textContent = "🗑 Supprimer";
  del.onclick = () => {
    div.remove();
  };

  div.appendChild(i1);
  div.appendChild(document.createElement("br"));
  div.appendChild(i2);
  div.appendChild(document.createElement("br"));
  div.appendChild(i3);
  div.appendChild(document.createElement("br"));
  div.appendChild(del);
  div.appendChild(document.createElement("br"));
  div.appendChild(document.createElement("br"));

  document.getElementById("cats").appendChild(div);
}

/* SAVE */
function save(){

  let data = [];

  document.querySelectorAll("#cats div").forEach(d=>{
    let i = d.querySelectorAll("input");

    data.push({
      name:i[0].value,
      level:i[1].value,
      words:i[2].value.split(",").map(x=>x.trim())
    });
  });

  const gridName = document.getElementById("name").value || "Sans nom";

  grids.push({
    name: gridName,
    categories:data
  });

  localStorage.setItem("grids", JSON.stringify(grids));

  alert("✅ Grille sauvegardée !");

  render();
}

/* COPY JSON */
function copyJSON(){

  let data = [];

  document.querySelectorAll("#cats div").forEach(d=>{
    let i = d.querySelectorAll("input");

    data.push({
      name:i[0].value,
      level:i[1].value,
      words:i[2].value.split(",").map(x=>x.trim())
    });
  });

  const json = JSON.stringify({
    name: document.getElementById("name").value,
    categories:data
  }, null, 2);

  navigator.clipboard.writeText(json);

  alert("✅ JSON copié !");
}

/* LIST */
function render(){

  const container = document.getElementById("grids");
  container.innerHTML="";

  grids.forEach((g,i)=>{

    const d = document.createElement("div");

    const title = document.createElement("b");
    title.textContent = g.name;

    const play = document.createElement("button");
    play.textContent="▶";
    play.onclick=()=>startLocal(i);

    const copy = document.createElement("button");
    copy.textContent="📋";
    copy.onclick=()=>{
      navigator.clipboard.writeText(JSON.stringify(g,null,2));
      alert("JSON copié !");
    };

    const del = document.createElement("button");
    del.textContent="🗑";
    del.onclick=()=>{
      grids.splice(i,1);
      localStorage.setItem("grids", JSON.stringify(grids));
      render();
    };

    d.appendChild(title);
    d.appendChild(document.createElement("br"));
    d.appendChild(play);
    d.appendChild(copy);
    d.appendChild(del);

    container.appendChild(d);
  });
}

/* LOAD JSON */
async function loadGame(){

  const res = await fetch("grid.json");
  const gameData = await res.json();

  gameCats = gameData.categories;

  start(gameData.name);
}

/* START LOCAL */
function startLocal(i){

  const g = grids[i];

  gameCats = g.categories;

  hideAll();
  document.getElementById("game").style.display="block";

  start(g.name);
}

/* START */
function start(titleText){

  let words = [];
  gameCats.forEach(c=>words.push(...c.words));
  words.sort(()=>Math.random()-0.5);

  selected=[];
  lives=4;

  document.getElementById("title").textContent = titleText;
  document.getElementById("lives").textContent = 4;
  document.getElementById("msg").textContent = "";

  /* ⭐ RESET CATEGORIES TROUVÉES */
  document.getElementById("found").innerHTML = "";

  const grid = document.getElementById("grid");
  grid.innerHTML="";

  words.forEach(w=>{
    let b=document.createElement("button");
    b.className="word";
    b.textContent=w;

    b.onclick=()=>{
      if(b.classList.contains("correct")) return;

      if(selected.includes(w)){
        selected=selected.filter(x=>x!==w);
        b.classList.remove("selected");
      } else if(selected.length<4){
        selected.push(w);
        b.classList.add("selected");
      }
    };

    grid.appendChild(b);
  });
}

/* RESET */
function clearSelection(){
  selected=[];
  document.querySelectorAll(".word").forEach(b=>b.classList.remove("selected"));
}

/* CHECK */
function check(){

  const sel = selected.map(x=>x.toLowerCase().trim());

  for(let c of gameCats){

    let cw = c.words.map(x=>x.toLowerCase().trim());

    let ok = sel.length===4 && sel.every(w=>cw.includes(w));

    if(ok){

      document.getElementById("msg").textContent="✅ "+c.name;

      /* ⭐ AJOUT VISUEL CATÉGORIE TROUVÉE */
      const div = document.createElement("div");
      div.className = "found-cat level"+c.level;

      div.innerHTML =
        "🧩 "+c.name+" (Niveau "+c.level+")<br>" +
        c.words.join(", ");

      document.getElementById("found").appendChild(div);

      document.querySelectorAll(".word").forEach(b=>{
        if(sel.includes(b.textContent.toLowerCase().trim())){
          b.classList.add("correct");
          b.disabled=true;
        }
      });

      clearSelection();

      /* 🎉 victoire */
      if(document.querySelectorAll(".correct").length === 16){
        document.getElementById("msg").textContent="🎉 Félicitations !!! 👏";
      }

      return;
    }

    let overlap = sel.filter(w=>cw.includes(w)).length;

    if(overlap===3){
      document.getElementById("msg").textContent="⚠️ One Away";
      lives--;
      document.getElementById("lives").textContent=lives;
      clearSelection();

      if(lives===0) end();
      return;
    }
  }

  lives--;
  document.getElementById("lives").textContent=lives;
  document.getElementById("msg").textContent="❌ Faux";

  if(lives===0) end();

  clearSelection();
}

/* END */
function end(){
  document.getElementById("msg").textContent="💀 Fin";
  document.querySelectorAll(".word").forEach(b=>b.disabled=true);
}

/* INIT */
window.onload = () => {
  showGame();
};

</script>

</body>
</html>
